name: WP push fallback (Path B WAF unblock)

# Triggers from a non-cloud IP so Cloudways/Wordfence won't WAF-block the
# WP REST POST. Runs on:
#   - workflow_dispatch (manual trigger)
#   - push to main that touches data/runs/_pending-push/*.json
#
# After a successful push, commits the modified JSON files (now with
# wp_post_id populated) back with [skip ci] to avoid recursion.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "What to run"
        required: true
        default: "push"
        type: choice
        options:
          - push          # default — push every pending draft
          - verify-auth   # GET /users/me only; no posts created
  push:
    branches: [main]
    paths:
      - "data/runs/_pending-push/*.json"

permissions:
  contents: write

jobs:
  push:
    name: Push pending drafts to WordPress
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Verify WP credentials (no side effects)
        if: ${{ github.event.inputs.mode == 'verify-auth' }}
        env:
          FM_WP_USER: ${{ secrets.FM_WP_USER }}
          FM_WP_APP_PASSWORD: ${{ secrets.FM_WP_APP_PASSWORD }}
        run: |
          python -m tools.push_archive --verify-auth

      - name: Push pending drafts to WordPress
        if: ${{ github.event.inputs.mode != 'verify-auth' }}
        env:
          FM_WP_USER: ${{ secrets.FM_WP_USER }}
          FM_WP_APP_PASSWORD: ${{ secrets.FM_WP_APP_PASSWORD }}
          FM_WP_AUTHOR_ID: ${{ secrets.FM_WP_AUTHOR_ID }}
        run: |
          python -m tools.push_archive --apply

      - name: Commit wp_post_id write-back
        if: ${{ github.event.inputs.mode != 'verify-auth' }}
        run: |
          git config user.name  "fm-content[bot]"
          git config user.email "fm-content-bot@firstmovers.ai"
          if git diff --quiet -- data/runs/_pending-push/; then
            echo "no changes to commit"
          else
            git add data/runs/_pending-push/
            git commit -m "chore(content): wp_post_id write-back [skip ci]"
            git push
          fi
